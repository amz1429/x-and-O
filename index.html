<script>
  const h = React.createElement;
  const { useMemo, useState } = React;
  const { createRoot } = ReactDOM;

  const baseNotes = [
    { id: "musk", name: "المسك", icon: "🪵", en: "Musk" },
  ];

  const heartNotes = [
    { id: "rose", name: "الورد", icon: "🌹", en: "Rose" },
    { id: "jasmine", name: "الياسمين", icon: "🌼", en: "Jasmine" },
    { id: "cinnamon", name: "القرفة", icon: "🌰", en: "Cinnamon" },
  ];

  const topNotes = [
    { id: "bergamot", name: "البرغموت", icon: "🍋", en: "Bergamot" },
    { id: "orange", name: "البرتقال", icon: "🍊", en: "Orange" },
    { id: "lavender", name: "اللافندر", icon: "💜", en: "Lavender" },
  ];

  const presetPerfumes = [
    {
      id: "calm",
      moodLabel: "هادئ",
      moodIcon: "🕊️",
      title: "عطر هادئ",
      description: "رائحة ناعمة ومريحة بطابع هادئ ونظيف.",
      notes: ["المسك", "الياسمين", "اللافندر"],
      recipe: [
        { name: "المسك", drops: 3, type: "base" },
        { name: "الياسمين", drops: 5, type: "heart" },
        { name: "اللافندر", drops: 2, type: "top" },
      ],
    },
    {
      id: "fresh",
      moodLabel: "منعش",
      moodIcon: "🍃",
      title: "عطر منعش",
      description: "رائحة خفيفة ومشرقة تناسب من يحب الانتعاش.",
      notes: ["المسك", "البرغموت", "البرتقال"],
      recipe: [
        { name: "المسك", drops: 3, type: "base" },
        { name: "البرغموت", drops: 3, type: "top" },
        { name: "البرتقال", drops: 4, type: "top" },
      ],
    },
    {
      id: "elegant",
      moodLabel: "أنيق",
      moodIcon: "✨",
      title: "عطر أنيق",
      description: "رائحة متوازنة وأنيقة بطابع زهري راقٍ.",
      notes: ["المسك", "الورد", "الياسمين", "البرغموت"],
      recipe: [
        { name: "المسك", drops: 3, type: "base" },
        { name: "الورد", drops: 2, type: "heart" },
        { name: "الياسمين", drops: 3, type: "heart" },
        { name: "البرغموت", drops: 2, type: "top" },
      ],
    },
    {
      id: "bold",
      moodLabel: "جريء",
      moodIcon: "🔥",
      title: "عطر جريء",
      description: "رائحة دافئة وواضحة بلمسة حارة خفيفة.",
      notes: ["المسك", "الورد", "القرفة", "البرتقال"],
      recipe: [
        { name: "المسك", drops: 3, type: "base" },
        { name: "الورد", drops: 4, type: "heart" },
        { name: "القرفة", drops: 1, type: "heart" },
        { name: "البرتقال", drops: 2, type: "top" },
      ],
    },
  ];

  const typeLabels = {
    base: "القاعدة",
    heart: "القلب",
    top: "الفوّاح",
  };

  function NoteCard({ item, category, active, onClick }) {
    return h(
      "button",
      {
        className: "card" + (active ? " active" : ""),
        onClick,
        type: "button",
      },
      h("small", null, item.icon + " نوتة عطرية"),
      h("div", { className: "note-name" }, item.name),
      h("small", null, item.en),
      h("div", { className: "category" }, category)
    );
  }

  function PresetCard({ item, onClick }) {
    return h(
      "button",
      {
        className: "card",
        onClick,
        type: "button",
      },
      h("small", null, `${item.moodIcon} نوتة عطرية`),
      h("div", { className: "note-name" }, item.moodLabel),
      h("small", null, "Mood"),
      h("p", { className: "hint" }, item.description),
      h("div", { className: "category" }, item.title)
    );
  }

  function App() {
    const [step, setStep] = useState(0);
    const [mode, setMode] = useState("custom");
    const [selectedPreset, setSelectedPreset] = useState(null);
    const [base, setBase] = useState("");
    const [hearts, setHearts] = useState([]);
    const [top, setTop] = useState("");
    const [customName, setCustomName] = useState("");

    const selectedBase = baseNotes.find((n) => n.id === base);
    const selectedTop = topNotes.find((n) => n.id === top);
    const selectedHearts = heartNotes.filter((n) => hearts.includes(n.id));
    const sortedHearts = [...selectedHearts].sort((a, b) =>
      a.id === "cinnamon" ? 1 : b.id === "cinnamon" ? -1 : 0
    );

    const suggestedName = useMemo(() => {
      if (!selectedTop || !selectedBase) return "تركيبتك الخاصة";
      return `${selectedTop.name} ولمسة ${selectedBase.name}`;
    }, [selectedTop, selectedBase]);

    const perfumeName =
      mode === "preset"
        ? selectedPreset?.title || "تركيبتك الخاصة"
        : customName.trim() || suggestedName;

    const description = useMemo(() => {
      if (mode === "preset" && selectedPreset) return selectedPreset.description;
      if (!selectedBase || !selectedTop || sortedHearts.length === 0) {
        return "اختر المكونات لتوليد وصف عطري تلقائي.";
      }
      const heartLine = sortedHearts.map((item) => item.name).join(" و");
      return `تركيبة متوازنة تبدأ بنفحات ${selectedTop.name}، يتبعها قلب من ${heartLine}، وترتكز على قاعدة من ${selectedBase.name}.`;
    }, [mode, selectedPreset, selectedBase, selectedTop, sortedHearts]);

    const recipe = useMemo(() => {
      if (mode === "preset" && selectedPreset) {
        return selectedPreset.recipe.map((item) => ({
          label: `${item.name} (${typeLabels[item.type]})`,
          drops: item.drops,
        }));
      }

      const items = [];
      if (selectedBase) items.push({ label: `${selectedBase.name} (القاعدة)`, drops: 3 });

      if (sortedHearts.length === 1) {
        const singleHeart = sortedHearts[0];
        items.push({
          label: `${singleHeart.name} (القلب)`,
          drops: singleHeart.id === "cinnamon" ? 1 : 5,
        });
      }

      if (sortedHearts.length === 2) {
        const hasCinnamon = sortedHearts.some((item) => item.id === "cinnamon");

        if (hasCinnamon) {
          sortedHearts.forEach((item) => {
            items.push({
              label: `${item.name} (القلب)`,
              drops: item.id === "cinnamon" ? 1 : 4,
            });
          });
        } else {
          items.push({ label: `${sortedHearts[0].name} (القلب)`, drops: 3 });
          items.push({ label: `${sortedHearts[1].name} (القلب)`, drops: 2 });
        }
      }

      if (selectedTop) items.push({ label: `${selectedTop.name} (الفوّاح)`, drops: 2 });

      return items;
    }, [mode, selectedPreset, selectedBase, sortedHearts, selectedTop]);

    const notesLine = useMemo(() => {
      if (mode === "preset" && selectedPreset) {
        return selectedPreset.notes.join(" + ");
      }
      return [selectedBase?.name, ...sortedHearts.map((n) => n.name), selectedTop?.name]
        .filter(Boolean)
        .join(" + ");
    }, [mode, selectedPreset, selectedBase, sortedHearts, selectedTop]);

    const layers = useMemo(() => {
      if (mode === "preset" && selectedPreset) {
        return {
          base: selectedPreset.recipe.filter((x) => x.type === "base").map((x) => x.name),
          heart: selectedPreset.recipe.filter((x) => x.type === "heart").map((x) => x.name),
          top: selectedPreset.recipe.filter((x) => x.type === "top").map((x) => x.name),
        };
      }

      return {
        base: selectedBase ? [selectedBase.name] : [],
        heart: sortedHearts.map((x) => x.name),
        top: selectedTop ? [selectedTop.name] : [],
      };
    }, [mode, selectedPreset, selectedBase, sortedHearts, selectedTop]);

    const toggleHeart = (id) => {
      if (hearts.includes(id)) {
        setHearts(hearts.filter((item) => item !== id));
        return;
      }
      if (hearts.length < 2) setHearts([...hearts, id]);
    };

    const chooseCustomPath = () => {
      setMode("custom");
      setSelectedPreset(null);
      setBase("");
      setHearts([]);
      setTop("");
      setCustomName("");
      setStep(2);
    };

    const choosePreset = (preset) => {
      setMode("preset");
      setSelectedPreset(preset);
      setBase("musk");
      setHearts([]);
      setTop("");
      setCustomName("");
      setStep(5);
    };

    const goStart = () => {
      setStep(0);
      setMode("custom");
      setSelectedPreset(null);
      setBase("");
      setHearts([]);
      setTop("");
      setCustomName("");
    };

    const savePerfume = () => {
      const payload = {
        mode,
        perfumeName,
        description,
        notes: notesLine,
        base: layers.base,
        heart: layers.heart,
        top: layers.top,
        recipe,
        createdAt: new Date().toISOString(),
      };
      const history = JSON.parse(localStorage.getItem("dahdah-perfumes") || "[]");
      history.push(payload);
      localStorage.setItem("dahdah-perfumes", JSON.stringify(history));
      window.alert("تم حفظ عطرك بنجاح ✨");
    };

    const printLabel = () => {
      const labelWindow = window.open("", "_blank", "width=420,height=620");
      if (!labelWindow) return;

      labelWindow.document.write(`
        <html lang="ar" dir="rtl">
          <head>
            <meta charset="UTF-8" />
            <title>ملصق عطري</title>
            <style>
              body { font-family: Cairo, sans-serif; background: #f6f1ea; padding: 24px; }
              .label { border: 1px solid #b89461; border-radius: 16px; background: #fff; padding: 16px; }
              h2 { margin: 0 0 8px; }
              p { margin: 8px 0; line-height: 1.7; }
            </style>
          </head>
          <body>
            <div class="label">
              <h2>${perfumeName}</h2>
              <p>${description}</p>
              <p><strong>النوتات:</strong> ${notesLine || "-"}</p>
              <p><strong>الوصفة:</strong></p>
              <ul>${recipe.map((r) => `<li>${r.label}: ${r.drops} قطرات</li>`).join("")}</ul>
            </div>
          </body>
        </html>
      `);

      labelWindow.document.close();
      labelWindow.focus();
      labelWindow.print();
    };

    const progressMap = ["(1/6)", "(2/6)", "(3/6)", "(4/6)", "(5/6)", "(6/6)"];

    return h(
      "main",
      { className: "shell" },
      h(
        "header",
        { className: "brand" },
        h(
          "div",
          { className: "logo" },
          h("span", { className: "logo-mark" }, "✿"),
          h("span", null, "عطور الدحدح")
        ),
        h("small", { className: "lead" }, "مختبر تركيب العطور"),
        h("small", { className: "lead" }, "Perfume Lab")
      ),
      h(
        "section",
        { className: "app" },
        h(
          "div",
          { className: "step" },
          h("div", { className: "progress" }, `الخطوة: ${progressMap[step]}`),

          step === 0 &&
            h(
              "div",
              { className: "step" },
              h("span", { className: "eyebrow" }, "ركّب عطرك الدحدحي"),
              h("h1", null, "صمّم عطرك بنفسك بسهولة وأناقة"),
              h(
                "p",
                { className: "lead" },
                "اختر مسار التركيب: عطر جاهز فورًا أو متابعة التركيب اليدوي خطوة بخطوة."
              ),
              h(
                "div",
                { className: "actions" },
                h("button", { className: "btn-primary", onClick: () => setStep(1) }, "ابدأ")
              )
            ),

          step === 1 &&
            h(
              "div",
              { className: "step" },
              h("h2", null, "اختر المزاج"),
              h("p", { className: "lead" }, "حدد الطابع العطري الذي يناسب شخصيتك."),
              h(
                "button",
                {
                  type: "button",
                  className: "card",
                  style: {
                    width: "100%",
                    minHeight: "120px",
                    borderColor: "rgba(143, 122, 184, 0.62)",
                    fontSize: "clamp(1.45rem, 4vw, 2.15rem)",
                    fontWeight: "800",
                  },
                  onClick: chooseCustomPath,
                },
                "أبغا أصنع عطري"
              ),
              h(
                "div",
                { className: "cards", style: { marginTop: "16px" } },
                presetPerfumes.map((item) =>
                  h(PresetCard, {
                    key: item.id,
                    item,
                    onClick: () => choosePreset(item),
                  })
                )
              ),
              h(
                "div",
                { className: "actions" },
                h("button", { className: "btn-secondary", onClick: () => setStep(0) }, "رجوع")
              )
            ),

          step === 2 &&
            h(
              "div",
              { className: "step" },
              h("h2", null, "اختر نوتة القاعدة"),
              h("p", { className: "lead" }, "مطلوب اختيار نوتة عطرية واحدة فقط."),
              h(
                "div",
                { className: "cards" },
                baseNotes.map((item) =>
                  h(NoteCard, {
                    key: item.id,
                    item,
                    category: "Base Note = القاعدة",
                    active: base === item.id,
                    onClick: () => setBase(item.id),
                  })
                )
              ),
              h(
                "div",
                { className: "actions" },
                h("button", { className: "btn-secondary", onClick: () => setStep(1) }, "رجوع"),
                h(
                  "button",
                  {
                    className: "btn-primary",
                    onClick: () => setStep(3),
                    disabled: !base,
                  },
                  "التالي"
                )
              )
            ),

          step === 3 &&
            h(
              "div",
              { className: "step" },
              h("h2", null, "اختر نوتة القلب"),
              h("p", { className: "lead" }, "اختر نوتة عطرية واحدة أو اثنتين."),
              h(
                "div",
                { className: "cards" },
                heartNotes.map((item) =>
                  h(NoteCard, {
                    key: item.id,
                    item,
                    category: "Heart Note = القلب",
                    active: hearts.includes(item.id),
                    onClick: () => toggleHeart(item.id),
                  })
                )
              ),
              hearts.length === 2 &&
                !hearts.includes("cinnamon") &&
                h(
                  "p",
                  { className: "hint" },
                  "تم اختيار نوتتين للقلب (سيتم توزيع 3 + 2 قطرات)."
                ),
              hearts.includes("cinnamon") &&
                h(
                  "p",
                  { className: "hint" },
                  "القرفة نوتة قوية في القلب، لذلك تُستخدم بحد أقصى قطرة واحدة."
                ),
              hearts.length === 1 &&
                hearts[0] === "cinnamon" &&
                h(
                  "p",
                  { className: "hint" },
                  "للحفاظ على 10 قطرات، أضف نوتة قلب ثانية مع القرفة."
                ),
              h(
                "div",
                { className: "actions" },
                h("button", { className: "btn-secondary", onClick: () => setStep(2) }, "رجوع"),
                h(
                  "button",
                  {
                    className: "btn-primary",
                    onClick: () => setStep(4),
                    disabled:
                      hearts.length < 1 ||
                      hearts.length > 2 ||
                      (hearts.length === 1 && hearts[0] === "cinnamon"),
                  },
                  "التالي"
                )
              )
            ),

          step === 4 &&
            h(
              "div",
              { className: "step" },
              h("h2", null, "اختر نوتة الفوّاح"),
              h("p", { className: "lead" }, "مطلوب اختيار نوتة عطرية واحدة فقط."),
              h(
                "div",
                { className: "cards" },
                topNotes.map((item) =>
                  h(NoteCard, {
                    key: item.id,
                    item,
                    category: "Top Note = الفوّاح",
                    active: top === item.id,
                    onClick: () => setTop(item.id),
                  })
                )
              ),
              h(
                "div",
                { className: "actions" },
                h("button", { className: "btn-secondary", onClick: () => setStep(3) }, "رجوع"),
                h(
                  "button",
                  {
                    className: "btn-primary",
                    onClick: () => {
                      setMode("custom");
                      setSelectedPreset(null);
                      setStep(5);
                    },
                    disabled: !top,
                  },
                  "عرض النتيجة"
                )
              )
            ),

          step === 5 &&
            h(
              "div",
              { className: "step" },
              h("span", { className: "eyebrow" }, "تركيبتك النهائية"),
              h("h2", null, perfumeName),
              h("p", { className: "lead" }, description),
              mode === "custom" &&
                h("input", {
                  className: "input",
                  value: customName,
                  placeholder: "اكتب اسمًا مخصصًا لعطرك (اختياري)",
                  onChange: (event) => setCustomName(event.target.value),
                }),
              h(
                "div",
                { className: "result-grid" },
                h(
                  "article",
                  { className: "panel" },
                  h("h3", null, "النوتات"),
                  h("p", { className: "lead" }, notesLine || "-")
                ),
                h(
                  "article",
                  { className: "panel" },
                  h("h3", null, "الوصفة النهائية بالقطرات"),
                  h(
                    "ul",
                    { className: "recipe-list" },
                    recipe.map((item) =>
                      h("li", { key: item.label }, `${item.label}: ${item.drops} قطرات`)
                    )
                  )
                ),
                h(
                  "article",
                  { className: "panel" },
                  h("h3", null, "هرم النوتات العطرية"),
                  h(
                    "div",
                    { className: "pyramid" },
                    h(
                      "div",
                      { className: "layer top" },
                      `${layers.top.join(" + ") || "-"} · الفوّاح`
                    ),
                    h(
                      "div",
                      { className: "layer heart" },
                      `${layers.heart.join(" + ") || "-"} · القلب`
                    ),
                    h(
                      "div",
                      { className: "layer base" },
                      `${layers.base.join(" + ") || "-"} · القاعدة`
                    )
                  )
                ),
                h(
                  "article",
                  { className: "panel full" },
                  h("h3", null, "طريقة التحضير"),
                  h(
                    "p",
                    { className: "lead" },
                    "1) أضف الزيوت العطرية حسب الوصفة. 2) أكمل العبوة بزيت الجوجوبا. 3) أغلق الزجاجة ورجّها بلطف لعدة ثوانٍ."
                  )
                )
              ),
              h(
                "div",
                { className: "actions" },
                h("button", { className: "btn-primary", onClick: savePerfume }, "Save My Perfume"),
                h("button", { className: "btn-secondary", onClick: printLabel }, "Print Label"),
                h("button", { className: "btn-secondary", onClick: goStart }, "Start Again")
              )
            )
        )
      )
    );
  }

  createRoot(document.getElementById("root")).render(h(App));
</script>
