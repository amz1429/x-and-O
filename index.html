<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ركّب عطرك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f7f3ed;
        --surface: #fffdf9;
        --surface-2: #f2e8dc;
        --text: #3f342c;
        --muted: #8a786c;
        --accent: #b9975b;
        --accent-soft: #d7c1a0;
        --rose: #c79ba3;
        --shadow: 0 16px 40px rgba(74, 52, 39, 0.12);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Cairo", sans-serif;
        background:
          radial-gradient(circle at 15% 12%, #efe1d2 0, transparent 32%),
          radial-gradient(circle at 88% 10%, #f2e0dd 0, transparent 28%),
          linear-gradient(155deg, #f8f4ef, #f4ede3 55%, #f9f6f2);
        color: var(--text);
      }

      #root {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
      }

      .app {
        width: min(100%, 760px);
        background: rgba(255, 253, 249, 0.86);
        border: 1px solid rgba(185, 151, 91, 0.22);
        box-shadow: var(--shadow);
        border-radius: 28px;
        padding: 22px;
      }

      .tag {
        display: inline-block;
        color: var(--accent);
        font-size: 0.86rem;
        letter-spacing: 0.08em;
        margin-bottom: 6px;
      }

      h1, h2, h3, p { margin: 0; }
      h1 { font-size: clamp(1.8rem, 5vw, 2.35rem); }
      h2 { font-size: clamp(1.35rem, 4vw, 1.7rem); margin-bottom: 8px; }

      .lead { color: var(--muted); margin-top: 10px; line-height: 1.7; }
      .step { animation: fadeIn 320ms ease; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .cards {
        margin-top: 18px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 12px;
      }

      .card {
        border: 1px solid rgba(185, 151, 91, 0.28);
        border-radius: 16px;
        padding: 12px;
        background: var(--surface);
        transition: all 0.2s ease;
        cursor: pointer;
      }

      .card:hover { transform: translateY(-2px); }
      .card.active {
        border-color: var(--accent);
        background: linear-gradient(140deg, #fffefb, var(--surface-2));
        box-shadow: 0 8px 16px rgba(185, 151, 91, 0.17);
      }

      .card small { display: block; color: var(--muted); margin-bottom: 2px; }
      .category {
        font-size: 0.74rem;
        color: var(--rose);
        margin-top: 4px;
      }

      .actions {
        margin-top: 18px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 11px 18px;
        font-family: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .btn-primary {
        background: linear-gradient(120deg, var(--accent), #c7a975);
        color: #fff;
      }

      .btn-secondary {
        background: #efe6da;
        color: var(--text);
      }

      .input {
        width: 100%;
        margin-top: 12px;
        padding: 11px 12px;
        border-radius: 12px;
        border: 1px solid rgba(185, 151, 91, 0.35);
        background: #fff;
        font-family: inherit;
      }

      .result-grid {
        margin-top: 16px;
        display: grid;
        gap: 14px;
      }

      .panel {
        background: #fff;
        border: 1px solid rgba(185, 151, 91, 0.2);
        border-radius: 16px;
        padding: 14px;
      }

      .recipe-list { margin: 10px 0 0; padding: 0; list-style: none; }
      .recipe-list li { margin: 6px 0; color: #594b40; }

      .pyramid {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .layer {
        margin-inline: auto;
        text-align: center;
        padding: 8px;
        border-radius: 12px;
        color: #fff;
        font-size: 0.9rem;
      }

      .layer.top { width: 54%; background: #c8a06c; }
      .layer.heart { width: 74%; background: #bc8f97; }
      .layer.base { width: 92%; background: #8b7061; }

      .progress {
        color: var(--muted);
        font-size: 0.85rem;
        margin-bottom: 12px;
      }

      @media (max-width: 520px) {
        .app { padding: 18px; border-radius: 22px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module">
      import React, { useMemo, useState } from "https://esm.sh/react@18.2.0";
      import { createRoot } from "https://esm.sh/react-dom@18.2.0/client";

      const moods = ["هادئ", "منعش", "أنيق", "جريء"];
      const baseNotes = [{ id: "musk", name: "Musk" }, { id: "cinnamon", name: "Cinnamon" }];
      const heartNotes = [{ id: "rose", name: "Rose" }, { id: "jasmine", name: "Jasmine" }];
      const topNotes = [
        { id: "bergamot", name: "Bergamot" },
        { id: "orange", name: "Orange" },
        { id: "lavender", name: "Lavender" },
      ];

      const moodText = {
        "هادئ": "مريح ومتوازن بلمسة ناعمة",
        "منعش": "مشِرق وحيوي ينعش الحواس",
        "أنيق": "راقي ونظيف بطابع كلاسيكي",
        "جريء": "عميق ولافت بثقة واضحة",
      };

      function NoteCard({ label, category, active, onClick }) {
        return React.createElement(
          "button",
          { className: `card ${active ? "active" : ""}`, onClick, type: "button" },
          React.createElement("small", null, "اختيار"),
          React.createElement("h3", null, label),
          React.createElement("div", { className: "category" }, category)
        );
      }

      function App() {
        const [step, setStep] = useState(0);
        const [mood, setMood] = useState("");
        const [base, setBase] = useState("");
        const [hearts, setHearts] = useState([]);
        const [top, setTop] = useState("");
        const [customName, setCustomName] = useState("");

        const stepTitles = ["بداية", "المزاج", "القاعدة", "القلب", "الفوّاح", "النتيجة"];

        const suggestedName = useMemo(() => {
          if (!mood || !base || !top) return "عطر المناسبة";
          const baseName = baseNotes.find((n) => n.id === base)?.name ?? "Base";
          const topName = topNotes.find((n) => n.id === top)?.name ?? "Top";
          return `${mood} · ${baseName} & ${topName}`;
        }, [mood, base, top]);

        const nameToShow = customName.trim() || suggestedName;

        const description = useMemo(() => {
          if (!mood || !base || hearts.length === 0 || !top) return "";
          const baseName = baseNotes.find((n) => n.id === base)?.name;
          const topName = topNotes.find((n) => n.id === top)?.name;
          const heartNames = hearts.map((id) => heartNotes.find((n) => n.id === id)?.name).join(" و ");
          return `تركيبة ${moodText[mood]} تبدأ بنفحات ${topName}، تتوسطها لمسات ${heartNames}، وترتكز على قاعدة ${baseName} الدافئة.`;
        }, [mood, base, hearts, top]);

        const recipe = useMemo(() => {
          if (!base || hearts.length === 0 || !top) return [];
          const list = [];
          list.push({ label: baseNotes.find((n) => n.id === base)?.name + " (القاعدة)", drops: 3 });
          if (hearts.length === 1) {
            list.push({ label: heartNotes.find((n) => n.id === hearts[0])?.name + " (القلب)", drops: 5 });
          } else {
            list.push({ label: heartNotes.find((n) => n.id === hearts[0])?.name + " (القلب)", drops: 3 });
            list.push({ label: heartNotes.find((n) => n.id === hearts[1])?.name + " (القلب)", drops: 2 });
          }
          list.push({ label: topNotes.find((n) => n.id === top)?.name + " (الفوّاح)", drops: 2 });
          return list;
        }, [base, hearts, top]);

        const onToggleHeart = (id) => {
          setHearts((prev) => {
            if (prev.includes(id)) return prev.filter((x) => x !== id);
            if (prev.length >= 2) return prev;
            return [...prev, id];
          });
        };

        const savePerfume = () => {
          const text = `اسم العطر: ${nameToShow}\nالمزاج: ${mood}\nالوصفة:\n${recipe
            .map((r) => `- ${r.label}: ${r.drops} قطرات`)
            .join("\n")}\n\nالوصف: ${description}`;
          const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "my-perfume.txt";
          a.click();
          URL.revokeObjectURL(url);
        };

        const printLabel = () => {
          const html = `<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>بطاقة العطر</title><style>body{font-family:Cairo,sans-serif;padding:20px}.card{border:1px solid #b9975b;border-radius:14px;padding:16px;max-width:360px}h2{margin:0 0 10px}.muted{color:#7e6d61}.item{margin:4px 0}</style></head><body><div class="card"><h2>${nameToShow}</h2><div class="muted">${description}</div><hr>${recipe.map((r)=>`<div class="item">${r.label}: ${r.drops} قطرات</div>`).join("")}</div><script>window.print();<\/script></body></html>`;
          const w = window.open("", "_blank", "width=520,height=680");
          if (!w) return;
          w.document.write(html);
          w.document.close();
        };

        const reset = () => {
          setStep(0);
          setMood("");
          setBase("");
          setHearts([]);
          setTop("");
          setCustomName("");
        };

        return React.createElement(
          "main",
          { className: "app" },
          React.createElement("div", { className: "progress" }, `الخطوة: ${stepTitles[step]} (${step + 1}/6)`),
          step === 0 &&
            React.createElement(
              "section",
              { className: "step" },
              React.createElement("span", { className: "tag" }, "Perfume Lab"),
              React.createElement("h1", null, "ركّب عطرك"),
              React.createElement("p", { className: "lead" }, "اختبر تجربة تركيب عطر شخصية بسرعة وببساطة. اختر المزاج والنفحات، ثم احصل على وصفتك الجاهزة."),
              React.createElement("div", { className: "actions" },
                React.createElement("button", { className: "btn-primary", onClick: () => setStep(1) }, "ابدأ التركيب")
              )
            ),
          step === 1 && React.createElement("section", { className: "step" },
            React.createElement("h2", null, "اختر مزاج العطر"),
            React.createElement("p", { className: "lead" }, "اختر طابعًا عامًا يوجّه التكوين."),
            React.createElement("div", { className: "cards" }, moods.map((item) => React.createElement(NoteCard, {
              key: item,
              label: item,
              category: "Mood",
              active: mood === item,
              onClick: () => setMood(item),
            }))),
            React.createElement("div", { className: "actions" },
              React.createElement("button", { className: "btn-secondary", onClick: () => setStep(0) }, "رجوع"),
              React.createElement("button", { className: "btn-primary", onClick: () => setStep(2), disabled: !mood }, "التالي")
            )
          ),
          step === 2 && React.createElement("section", { className: "step" },
            React.createElement("h2", null, "اختر نفحة القاعدة"),
            React.createElement("p", { className: "lead" }, "مطلوب اختيار واحد فقط."),
            React.createElement("div", { className: "cards" }, baseNotes.map((note) => React.createElement(NoteCard, {
              key: note.id,
              label: note.name,
              category: "Base = القاعدة",
              active: base === note.id,
              onClick: () => setBase(note.id),
            }))),
            React.createElement("div", { className: "actions" },
              React.createElement("button", { className: "btn-secondary", onClick: () => setStep(1) }, "رجوع"),
              React.createElement("button", { className: "btn-primary", onClick: () => setStep(3), disabled: !base }, "التالي")
            )
          ),
          step === 3 && React.createElement("section", { className: "step" },
            React.createElement("h2", null, "اختر نفحات القلب"),
            React.createElement("p", { className: "lead" }, "اختر نفحة واحدة أو اثنتين."),
            React.createElement("div", { className: "cards" }, heartNotes.map((note) => React.createElement(NoteCard, {
              key: note.id,
              label: note.name,
              category: "Heart = القلب",
              active: hearts.includes(note.id),
              onClick: () => onToggleHeart(note.id),
            }))),
            React.createElement("div", { className: "actions" },
              React.createElement("button", { className: "btn-secondary", onClick: () => setStep(2) }, "رجوع"),
              React.createElement("button", { className: "btn-primary", onClick: () => setStep(4), disabled: hearts.length < 1 || hearts.length > 2 }, "التالي")
            )
          ),
          step === 4 && React.createElement("section", { className: "step" },
            React.createElement("h2", null, "اختر نفحة الفوّاح"),
            React.createElement("p", { className: "lead" }, "مطلوب اختيار واحد فقط."),
            React.createElement("div", { className: "cards" }, topNotes.map((note) => React.createElement(NoteCard, {
              key: note.id,
              label: note.name,
              category: "Top = الفوّاح",
              active: top === note.id,
              onClick: () => setTop(note.id),
            }))),
            React.createElement("div", { className: "actions" },
              React.createElement("button", { className: "btn-secondary", onClick: () => setStep(3) }, "رجوع"),
              React.createElement("button", { className: "btn-primary", onClick: () => setStep(5), disabled: !top }, "عرض النتيجة")
            )
          ),
          step === 5 && React.createElement("section", { className: "step" },
            React.createElement("h2", null, nameToShow),
            React.createElement("p", { className: "lead" }, description),
            React.createElement("input", {
              className: "input",
              placeholder: "اكتب اسمًا مخصصًا لعطرك (اختياري)",
              value: customName,
              onChange: (e) => setCustomName(e.target.value),
            }),
            React.createElement("div", { className: "result-grid" },
              React.createElement("div", { className: "panel" },
                React.createElement("h3", null, "الوصفة النهائية (بالقطرات)"),
                React.createElement("ul", { className: "recipe-list" }, recipe.map((item) => React.createElement("li", { key: item.label }, `${item.label}: ${item.drops}`)))
              ),
              React.createElement("div", { className: "panel" },
                React.createElement("h3", null, "هرم النفحات"),
                React.createElement("div", { className: "pyramid" },
                  React.createElement("div", { className: "layer top" }, `${topNotes.find((n) => n.id === top)?.name} · الفوّاح`),
                  React.createElement("div", { className: "layer heart" }, `${hearts.map((id) => heartNotes.find((n) => n.id === id)?.name).join(" + ")} · القلب`),
                  React.createElement("div", { className: "layer base" }, `${baseNotes.find((n) => n.id === base)?.name} · القاعدة`)
                )
              ),
              React.createElement("div", { className: "panel" },
                React.createElement("h3", null, "طريقة التحضير"),
                React.createElement("p", { className: "lead" }, "أضف الزيوت حسب الوصفة، ثم أكمل بزيت الجوجوبا، وبعدها رجّ الزجاجة بلطف لعدة ثوانٍ.")
              )
            ),
            React.createElement("div", { className: "actions" },
              React.createElement("button", { className: "btn-primary", onClick: savePerfume }, "Save My Perfume"),
              React.createElement("button", { className: "btn-secondary", onClick: printLabel }, "Print Label"),
              React.createElement("button", { className: "btn-secondary", onClick: reset }, "Start Again")
            )
          )
        );
      }

      createRoot(document.getElementById("root")).render(React.createElement(App));
    </script>
  </body>
</html>
